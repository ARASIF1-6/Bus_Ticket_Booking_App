<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Bus Booking App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
  <div class="container py-4">
    <h1>Bus Booking App</h1>
    <div class="row">
      <div class="col-md-6">
        <h4>Search buses</h4>
        <form id="searchForm">
          <div class="mb-2">
            <input id="from" class="form-control" placeholder="From (district)"/>
          </div>
          <div class="mb-2">
            <input id="to" class="form-control" placeholder="To (district)"/>
          </div>
          <div class="mb-2">
            <input id="maxFare" class="form-control" placeholder="Max fare (optional)"/>
          </div>
          <button class="btn btn-primary">Search</button>
        </form>
        <div id="searchResults" class="mt-3"></div>
      </div>

      <div class="col-md-6">
        <h4>Book a ticket</h4>
        <form id="bookForm">
          <input id="passenger_name" class="form-control mb-2" placeholder="Name" required/>
          <input id="phone" class="form-control mb-2" placeholder="Phone" required/>
          <input id="b_from" class="form-control mb-2" placeholder="From district" required/>
          <input id="b_to" class="form-control mb-2" placeholder="To district" required/>
          <input id="b_dp" class="form-control mb-2" placeholder="Dropping point" required/>
          <input id="b_fare" class="form-control mb-2" placeholder="Fare" type="number" required/>
          <input id="b_date" class="form-control mb-2" placeholder="Travel date (YYYY-MM-DD)" required/>
          <button class="btn btn-success">Book</button>
        </form>
        <div id="bookResult" class="mt-2"></div>

        <hr/>
        <h5>RAG Query</h5>
        <form id="ragForm">
          <input id="q" class="form-control mb-2" placeholder="Ask questions like 'What are Hanif contact details?'" />
          <button class="btn btn-outline-secondary">Ask</button>
        </form>
        <pre id="ragAnswer"></pre>
      </div>
    </div>
    <hr/>
    <small>Provider policy files used: <code>/data/shyamoli.txt</code> and <code>/data/soudia.txt</code> (these are the uploaded files). See README for run instructions.</small>
  </div>

  <script>
  document.getElementById('searchForm').onsubmit = async (e) => {
    e.preventDefault();
    const from = document.getElementById('from').value;
    const to = document.getElementById('to').value;
    const max = document.getElementById('maxFare').value;
    const params = new URLSearchParams({from_district: from, to_district: to});
    if(max) params.append('max_fare', max);
    let r = await fetch('/api/search?' + params.toString());
    let json = await r.json();
    const dst = document.getElementById('searchResults');
    dst.innerHTML = JSON.stringify(json.results, null, 2);
  };

  document.getElementById('bookForm').onsubmit = async (e) => {
    e.preventDefault();
    const payload = {
      passenger_name: document.getElementById('passenger_name').value,
      phone: document.getElementById('phone').value,
      from_district: document.getElementById('b_from').value,
      to_district: document.getElementById('b_to').value,
      dropping_point: document.getElementById('b_dp').value,
      fare: parseInt(document.getElementById('b_fare').value),
      travel_date: document.getElementById('b_date').value
    };
    let r = await fetch('/api/book', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
    let j = await r.json();
    document.getElementById('bookResult').innerText = 'Booking created: ' + JSON.stringify(j, null, 2);
  };

  document.getElementById('ragForm').onsubmit = async (e) => {
    e.preventDefault();
    const q = document.getElementById('q').value;
    let r = await fetch('/api/rag?q=' + encodeURIComponent(q));
    let j = await r.json();
    document.getElementById('ragAnswer').innerText = JSON.stringify(j, null, 2);
  };
  </script>
</body>
</html>
